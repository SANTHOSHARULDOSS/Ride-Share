<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline Mode - Ride Share</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #121212 0%, #1e1b4b 100%);
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .offline-card {
            background: rgba(30, 30, 36, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }
        .offline-icon {
            font-size: 5rem;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.08); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="offline-card card shadow-lg">
            <div class="card-body">
                <div class="offline-icon">
                    <i class="fa-solid fa-wifi-slash"></i>
                </div>
                <h1 class="h3 mb-3 fw-bold text-white">Connection Lost</h1>
                <p class="text-secondary mb-4">
                    You are currently offline. However, the Ride Share MVP is equipped with **Demo Mode** to keep the demonstration working smoothly without internet.
                </p>
                <div class="alert alert-warning border-0 bg-warning bg-opacity-10 text-warning rounded-4 text-start mb-4 py-3 px-4">
                    <div class="d-flex align-items-center mb-1">
                        <i class="fa-solid fa-circle-info me-2"></i>
                        <strong class="text-white">Demonstration Ready</strong>
                    </div>
                    We will automatically load simulated route coordinates and offline mockup dashboards.
                </div>
                <div class="d-grid gap-2">
                    <button onclick="window.location.reload();" class="btn btn-primary btn-lg rounded-pill py-2 px-4 shadow-sm">
                        <i class="fa-solid fa-rotate-right me-2"></i>Retry Connection
                    </button>
                    <a href="/dashboard/" class="btn btn-outline-light btn-lg rounded-pill py-2 px-4">
                        <i class="fa-solid fa-gauge me-2"></i>View Demo Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
