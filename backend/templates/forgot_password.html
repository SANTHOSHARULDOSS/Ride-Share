{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="custom-card p-4 p-md-5">
                <div class="text-center mb-4">
                    <span class="d-inline-flex align-items-center justify-content-center bg-warning-subtle text-warning rounded-circle mb-3" style="width: 70px; height: 70px;">
                        <i class="fa-solid fa-key fs-2"></i>
                    </span>
                    <h2 class="fw-bold">Forgot Password</h2>
                    <p class="text-muted">Enter your registered email address, and we'll send you an access code to reset your password.</p>
                </div>
                
                <form method="POST" action="{% url 'forgot_password' %}">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label for="email" class="form-label fw-semibold">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                            <input type="email" name="email" id="email" class="form-control" placeholder="e.g. user@example.com" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                        Send Reset Code
                    </button>
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <a href="{% url 'login' %}" class="fw-bold text-primary"><i class="fa-solid fa-arrow-left me-2"></i> Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
