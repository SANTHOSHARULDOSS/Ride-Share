{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="custom-card p-4 p-md-5">
                <div class="text-center mb-4">
                    <span class="d-inline-flex align-items-center justify-content-center bg-success-subtle text-success rounded-circle mb-3" style="width: 70px; height: 70px;">
                        <i class="fa-solid fa-lock-open fs-2"></i>
                    </span>
                    <h2 class="fw-bold">Reset Password</h2>
                    <p class="text-muted">Enter the 6-character reset code sent to your email and select your new password.</p>
                </div>
                
                <form method="POST" action="{% url 'reset_password' %}">
                    {% csrf_token %}
                    <input type="hidden" name="user_id" value="{{ user_id }}">
                    
                    <div class="mb-3">
                        <label for="code" class="form-label fw-semibold">Verification Code</label>
                        <input type="text" name="code" id="code" class="form-control text-center fs-5 fw-bold uppercase" placeholder="e.g. A1B2C3" value="{{ code|default:'' }}" required>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">New Password</label>
                        <input type="password" name="password" id="password" class="form-control" placeholder="Minimum 6 characters" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                        Update Account Password
                    </button>
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <a href="{% url 'login' %}" class="fw-bold text-primary">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
