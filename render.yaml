services:
  - type: web
    name: ride-share-mvp
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py seed_demo"
    startCommand: "gunicorn config.wsgi:application"
    rootDir: backend
    plan: free
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: sqlite-disk
      mountPath: /data
      sizeGB: 1
